{% set name = "pop" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/charmbracelet/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 365b989dcd0c45256e304ddd8e7a4be8ac146ed24a5751930259c56c23a16dec

build:
  number: 0

requirements:
  build:
    - {{ compiler('go-nocgo') }}
    - go-licenses

test:
  commands:
    - pop --help

about:
  home: https://github.com/charmbracelet/pop
  dev_url: https://github.com/charmbracelet/pop
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Send emails from your terminal

extra:
  recipe-maintainers:
    - apcamargo
